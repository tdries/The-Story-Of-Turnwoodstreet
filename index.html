  <script>
    // ── Global touch state (read by InputHandler) ──────────────────────────
    window.__touch = {
      left: false, right: false, up: false, down: false,
      action: false, enter: false,
    };

    // Always show controls
    document.getElementById('touch-controls').classList.add('active');

    function bindBtn(id, flag) {
      const el = document.getElementById(id);
      function press(e)   { e.preventDefault(); window.__touch[flag] = true;  el.classList.add('pressed'); }
      function release(e) { e.preventDefault(); window.__touch[flag] = false; el.classList.remove('pressed'); }
      el.addEventListener('touchstart',  press,   { passive: false });
      el.addEventListener('touchend',    release, { passive: false });
      el.addEventListener('touchcancel', release, { passive: false });
      // Also support mouse for desktop testing
      el.addEventListener('mousedown', press);
      el.addEventListener('mouseup',   release);
    }

    bindBtn('btn-up',    'up');
    bindBtn('btn-left',  'left');
    bindBtn('btn-right', 'right');
    bindBtn('btn-down',  'down');
    bindBtn('btn-talk',  'action');
    bindBtn('btn-ok',    'enter');

    // Keyboard → button highlight mapping
    const keyMap = {
      'ArrowUp':    'btn-up',    'w': 'btn-up',    'W': 'btn-up',
      'ArrowDown':  'btn-down',  's': 'btn-down',  'S': 'btn-down',
      'ArrowLeft':  'btn-left',  'a': 'btn-left',  'A': 'btn-left',
      'ArrowRight': 'btn-right', 'd': 'btn-right', 'D': 'btn-right',
      ' ': 'btn-talk', 'z': 'btn-talk', 'Z': 'btn-talk',
      'Enter': 'btn-ok',
    };
    document.addEventListener('keydown', (e) => {
      const id = keyMap[e.key];
      if (id) document.getElementById(id)?.classList.add('pressed');
    });
    document.addEventListener('keyup', (e) => {
      const id = keyMap[e.key];
      if (id) document.getElementById(id)?.classList.remove('pressed');
    });

    // Save button — calls stateManager directly, no held-state needed
    const saveBtn = document.getElementById('btn-save');
    function doSave(e) {
      e.preventDefault();
      saveBtn.classList.add('pressed');
      if (window.__saveGame) window.__saveGame();
      setTimeout(() => saveBtn.classList.remove('pressed'), 300);
    }
    saveBtn.addEventListener('touchstart', doSave, { passive: false });
    saveBtn.addEventListener('mousedown',  doSave);
  </script>

  <script type="module">
    // ── Feedback → GitHub Issues ──────────────────────────────────────────
    const GH_TOKEN = import.meta.env.VITE_GITHUB_TOKEN ?? '';
    const GH_REPO  = 'tdries/The-Story-Of-Turnwoodstreet';
    const TOKEN_SET = !!GH_TOKEN;

    const overlay   = document.getElementById('feedback-overlay');
    const textarea  = document.getElementById('feedback-text');
    const category  = document.getElementById('feedback-category');
    const status    = document.getElementById('feedback-status');
    const sendBtn   = document.getElementById('btn-send-feedback');
    let lastSentAt  = 0;
    const COOLDOWN  = 30_000; // ms between submissions

    document.getElementById('feedback-btn').addEventListener('click', () => {
      overlay.classList.add('open');
      textarea.focus();
      if (window.__setGameKeyboard) window.__setGameKeyboard(false);
    });
    document.getElementById('btn-cancel-feedback').addEventListener('click', () => {
      overlay.classList.remove('open');
      textarea.value = '';
      status.textContent = '';
      status.style.color = '';
      if (window.__setGameKeyboard) window.__setGameKeyboard(true);
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) document.getElementById('btn-cancel-feedback').click();
    });

    // Stop Phaser from swallowing keystrokes inside the textarea
    textarea.addEventListener('keydown', (e) => e.stopPropagation());

    sendBtn.addEventListener('click', async () => {
      const msg = textarea.value.trim();
      if (!msg) return;

      if (!TOKEN_SET) {
        status.textContent = 'Feedback nog niet geconfigureerd.';
        status.style.color = '#ff6633';
        return;
      }

      const now = Date.now();
      if (now - lastSentAt < COOLDOWN) {
        const secs = Math.ceil((COOLDOWN - (now - lastSentAt)) / 1000);
        status.textContent = `Wacht nog ${secs}s voor je opnieuw verstuurt.`;
        status.style.color = '#ff6633';
        return;
      }

      sendBtn.disabled = true;
      status.textContent = 'Verzenden...';
      status.style.color = '#FFD700';

      const cat   = category.value;
      const title = `[${cat}] ${msg.split('\n')[0].slice(0, 55)}`;
      const body  = `**Categorie:** ${cat}\n\n${msg}\n\n---\n*Ingediend via het spel op ${new Date().toISOString()}*`;

      try {
        const res = await fetch(`https://api.github.com/repos/${GH_REPO}/issues`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GH_TOKEN}`,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ title, body, labels: ['player-feedback'] }),
        });

        if (res.ok) {
          const issue = await res.json();
          lastSentAt = Date.now();
          status.textContent = `Bedankt! Issue #${issue.number} aangemaakt.`;
          status.style.color = '#44ff88';
          textarea.value = '';
          setTimeout(() => {
            overlay.classList.remove('open');
            status.textContent = '';
            status.style.color = '';
            sendBtn.disabled = false;
            if (window.__setGameKeyboard) window.__setGameKeyboard(true);
          }, 2200);
        } else {
          throw new Error(`HTTP ${res.status}`);
        }
      } catch (err) {
        status.textContent = `Fout bij verzenden (${err.message}).`;
        status.style.color = '#ff6633';
        console.error('Feedback error:', err);
        sendBtn.disabled = false;
      }
    });
  </script>

  <script>
    // ── Radio Minerva ─────────────────────────────────────────────────────
    const radioBtn    = document.getElementById('radio-btn');
    const radioAudio  = new Audio();
    radioAudio.crossOrigin = 'anonymous';
    let radioPlaying  = false;

    radioBtn.addEventListener('click', () => {
      if (radioPlaying) {
        radioAudio.pause();
        radioAudio.src = '';
        radioPlaying = false;
        radioBtn.classList.remove('playing');
        radioBtn.innerHTML = '📻<br>MINERVA';
        if (window.__setGameMusic) window.__setGameMusic(true);
      } else {
        // Reload src each time to force fresh connection to the live stream
        radioAudio.src = 'https://streaming.radiominerva.be/minerva';
        radioAudio.play().then(() => {
          radioPlaying = true;
          radioBtn.classList.add('playing');
          radioBtn.innerHTML = '⏹<br>STOP';
          if (window.__setGameMusic) window.__setGameMusic(false);
        }).catch(() => {
          // HTTPS stream may not be available — fall back to HTTP via iframe trick
          radioBtn.innerHTML = '📻<br>MINERVA';
        });
      }
    });
  </script>

  <script>
    // ── Auth UI ────────────────────────────────────────────────────────────
    const loginGate     = document.getElementById('login-gate');
    const gateError     = document.getElementById('login-gate-error');
    const authUser      = document.getElementById('auth-user');
    const authAvatar    = document.getElementById('auth-avatar');
    const authName      = document.getElementById('auth-name');

    // BGM during login screen
    const loginMusic = new Audio('assets/audio/bgm/nastelbom-arabic-490152.mp3');
    loginMusic.loop   = true;
    loginMusic.volume = 0.35;
    loginMusic.play().catch(() => {});   // autoplay may be blocked; fine

    function fmtTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      if (h > 0) return `${h}u ${m}m`;
      return `${m}m`;
    }

    window.__onAuthChange = (user) => {
      if (user) {
        // Fade out gate
        loginMusic.pause();
        loginGate.classList.add('hidden');
        setTimeout(() => { loginGate.style.display = 'none'; }, 650);

        // Show user in auth panel
        authUser.classList.add('visible');
        authName.textContent = user.user_metadata?.full_name
                            || user.user_metadata?.name
                            || user.user_metadata?.user_name
                            || 'Speler';
        const av = user.user_metadata?.avatar_url;
        authAvatar.src = av || '';
        authAvatar.style.display = av ? 'block' : 'none';
      } else {
        loginGate.style.display = '';
        loginGate.classList.remove('hidden');
        authUser.classList.remove('visible');
        loginMusic.play().catch(() => {});
      }
    };

    window.__onLoginError = (msg) => {
      gateError.textContent = msg;
      setTimeout(() => { gateError.textContent = ''; }, 6000);
    };

    document.getElementById('btn-gate-google').addEventListener('click', () => {
      if (window.__loginWith) window.__loginWith('google');
      else { gateError.textContent = 'Laden... probeer opnieuw.'; }
    });
    document.getElementById('btn-logout').addEventListener('click', () => {
      if (window.__logout) window.__logout();
    });

    // ── Scoreboard ─────────────────────────────────────────────────────────
    const scoresOverlay = document.getElementById('scores-overlay');
    const scoresList    = document.getElementById('scores-list');
    let currentUserId   = null;

    window.__onAuthChange = ((orig) => (user) => {
      orig?.(user);
      currentUserId = user?.id ?? null;
    })(window.__onAuthChange);

    document.getElementById('btn-scores').addEventListener('click', async () => {
      scoresOverlay.classList.add('open');
      if (window.__setGameKeyboard) window.__setGameKeyboard(false);
      scoresList.innerHTML = '<div style="font-family:sans-serif;font-size:12px;color:#888">Laden...</div>';

      const rows = window.__getScoreboard
        ? await window.__getScoreboard()
        : [];

      if (!rows.length) {
        scoresList.innerHTML = '<div style="font-family:sans-serif;font-size:12px;color:#888">Nog geen scores.</div>';
        return;
      }

      scoresList.innerHTML = rows.map((r, i) => `
        <div class="score-row${r.user_id === currentUserId ? ' me' : ''}">
          <span class="score-rank">${i + 1}</span>
          ${r.avatar_url
            ? `<img class="score-avatar" src="${r.avatar_url}" alt="" />`
            : `<div class="score-avatar"></div>`}
          <span class="score-name">${r.display_name ?? 'Speler'}</span>
          <span class="score-time">${fmtTime(r.playtime_seconds ?? 0)}</span>
        </div>`).join('');
    });

    document.getElementById('scores-close').addEventListener('click', () => {
      scoresOverlay.classList.remove('open');
      if (window.__setGameKeyboard) window.__setGameKeyboard(true);
    });
    scoresOverlay.addEventListener('click', (e) => {
      if (e.target === scoresOverlay) document.getElementById('scores-close').click();
    });
  </script>

  <script>
    // ── Hint system ───────────────────────────────────────────────────────
    function getQuestHint() {
      let flags = {};
      try {
        const raw = localStorage.getItem('tbaan_save');
        if (raw) flags = JSON.parse(raw).questFlags ?? {};
      } catch (_) {}

      // Zone 1 — no gate
      if (!flags.met_yusuf)
        return 'Zoek Yusuf de koerier aan het begin van de Turnhoutsebaan. Hij heeft hulp nodig!';
      if (!flags.delivery_done)
        return 'Help Yusuf met zijn leveringen. Loop langs de adressen die hij noemt.';
      if (!flags.met_fatima)
        return 'Yusuf is geholpen! Zoek nu Fatima, ze staat verderop op straat.';
      if (!flags.stunt_quest_active)
        return "Fatima's nicht Nora trouwt binnenkort. Vraag Fatima wat je voor haar kunt doen.";
      if (!flags.stunt_quest_done)
        return 'Haal de trouwstof op bij Mevrouw Baert (Indian Boutique, nr.137) en breng ze naar Fatima.';

      // Gate → Zone 2
      if (!flags.has_community_trust)
        return 'Lever de stof af bij Fatima om het vertrouwen van de buurt te verdienen.';

      // Zone 2
      if (!flags.has_oud_string_item)
        return 'Zoek Mimoun (nr.239) — hij heeft een oud-snaar voor Reza. Die snaar opent de volgende wijk.';
      if (!flags.reza_quest_done)
        return 'Je hebt de snaar! Breng hem nu naar Reza zodat hij weer kan spelen.';

      // Signatures (needed for zone 3 boss)
      if (!flags.speculator_threatened) {
        const missing = ['sig_fatima','sig_omar','sig_reza','sig_baert','sig_aziz']
          .filter(f => !flags[f]);
        if (missing.length > 0)
          return `Verzamel handtekeningen voor de petitie — nog ${missing.length} nodig (Fatima, Omar, Reza, Mevrouw Baert, Aziz).`;
      }

      // Gate → Zone 3
      if (!flags.visited_de_roma)
        return 'Reza speelt weer! Ga nu naar Borger Hub (nr.284) in de volgende wijk.';
      if (!flags.has_permit_doc)
        return 'Versla de Bureau-Bulldozer bij Borger Hub om de vergunning te bemachtigen.';

      // Zone 3
      if (!flags.kracht_van_gemeenschap) {
        if (!flags.geest_encountered)
          return "Er waart een Geest van '88 op straat. Vind hem — maar gebruik geen geweld!";
        return "Gebruik de vaardigheid 'Samen Aan Tafel' om de Geest van '88 te verslaan.";
      }
      if (!flags.met_mayor)
        return 'Zoek Districtsvoorzitter El Osri — zij wil je spreken over een groot plan.';

      // Gate → Zone 4
      if (!flags.has_permit_doc)
        return 'Je hebt de vergunning nodig om Deurne te betreden. Versla eerst de Bulldozer-bureaucraat.';

      // Zone 4 — faction quests
      const factionDone = [
        'q_faction_moroccan_done','q_faction_turkish_done','q_faction_flemish_done',
        'q_faction_art_done','q_faction_school_done','q_faction_mosque_done','q_faction_frituur_done',
      ].filter(f => flags[f]).length;

      if (factionDone < 7) {
        const next = [];
        if (!flags.q_faction_moroccan_done && flags.met_fatima)   next.push('overtuig Fatima voor de Marokkaanse vereniging');
        if (!flags.q_faction_turkish_done)                          next.push('praat met Tine over de Turkse sociale club');
        if (!flags.q_faction_flemish_done && flags.stunt_quest_done) next.push('vraag Mevrouw Baert om Bar Leon te overtuigen');
        if (!flags.q_faction_art_done && flags.visited_de_roma)    next.push('koppel De Roma aan het Borgerhub kunstenaarscollectief');
        if (!flags.q_faction_school_done)                           next.push('spreek met Hamza over zijn school');
        if (!flags.q_faction_mosque_done && flags.kracht_van_gemeenschap) next.push('bezoek de imam van De-Koepel Moskee (Stenenbrug 11)');
        if (!flags.q_faction_frituur_done && flags.delivery_done)  next.push('help Frituur de Tram met de grootorde');
        const tip = next.length > 0 ? next[0] : 'zoek de overige facties op de Turnhoutsebaan';
        return `Je hebt ${factionDone}/7 facties overtuigd. Volgende stap: ${tip}.`;
      }

      return 'Alle 7 facties zijn overtuigd! Ga naar de Grote 2km Tafel voor het finale!';
    }

    const hintOverlay = document.getElementById('hint-overlay');
    const hintText    = document.getElementById('hint-text');

    document.getElementById('hint-btn').addEventListener('click', () => {
      hintText.textContent = getQuestHint();
      hintOverlay.classList.add('open');
      if (window.__setGameKeyboard) window.__setGameKeyboard(false);
    });
    document.getElementById('hint-close').addEventListener('click', () => {
      hintOverlay.classList.remove('open');
      if (window.__setGameKeyboard) window.__setGameKeyboard(true);
    });
    hintOverlay.addEventListener('click', (e) => {
      if (e.target === hintOverlay) document.getElementById('hint-close').click();
    });
  </script>
